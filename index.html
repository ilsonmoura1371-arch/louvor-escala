<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escala Louvor">

<meta property="og:type" content="website">
<meta property="og:title" content="Escala do Louvor">
<meta property="og:description" content="Acesse a escala do ministério de música.">
<meta property="og:image" content="guitarra.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">

<title>Escala do Louvor</title>

<link rel="manifest" href="manifest2.json">

<link class="js-apple-icon" rel="apple-touch-icon" href="guitarra.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyABNJEfKqvbTawlgQGPoIXMvYWRmH9kCZY",
    authDomain: "louvor-escala-5d26f.firebaseapp.com",
    projectId: "louvor-escala-5d26f",
    storageBucket: "louvor-escala-5d26f.firebasestorage.app",
    messagingSenderId: "144171388952",
    appId: "1:144171388952:web:54f59fa3dd9a149ab0f36d"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "escalas");

  let escalas         = [];
  let editDocId       = null;
  let pendingDeleteId = null;
  let unsubscribe     = null;

  const MESES  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const SEMANA = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

  function iniciarListener() {
    setStatus('connecting');
    const q = query(col, orderBy("dataISO", "asc"), orderBy("horario", "asc"));
    unsubscribe = onSnapshot(q,
      (snapshot) => {
        escalas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        setStatus('online');
        renderLista();
        atualizarBadge();
      },
      (error) => {
        console.error(error);
        setStatus('error');
      }
    );
  }

  function setStatus(s) {
    const el = document.getElementById('status-dot');
    const tx = document.getElementById('status-text');
    if(el && tx) {
      el.className = 'status-dot ' + s;
      tx.textContent = s === 'online' ? 'Ao vivo' : s === 'connecting' ? 'Conectando...' : 'Sem conexão';
    }
  }

  window.switchTab = function(tab) {
    document.getElementById('panel-form').classList.toggle('active',  tab === 'form');
    document.getElementById('panel-lista').classList.toggle('active', tab === 'lista');
    document.getElementById('tab-form').classList.toggle('active',    tab === 'form');
    document.getElementById('tab-lista').classList.toggle('active',   tab === 'lista');
  };

  let toastTimer;
  window.showToast = function(msg, tipo = '') {
    const el = document.getElementById('toast');
    el.innerHTML = msg;
    el.className = 'toast ' + tipo;
    clearTimeout(toastTimer);
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  };

  window.resetForm = function() {
    editDocId = null;
    ['data','horario','vocal','back','hinos','links','recados'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.value = '';
    });
    document.getElementById('form-title-text').textContent = 'Agendar nova data';
    document.getElementById('btn-salvar').textContent = 'Salvar na Escala';
    document.getElementById('btn-cancelar').classList.remove('visible');
    document.getElementById('btn-salvar').disabled = false;
  };

  window.salvar = async function() {
    const data    = document.getElementById('data').value.trim();
    const horario = document.getElementById('horario').value.trim();
    const vocal   = document.getElementById('vocal').value.trim();
    const back    = document.getElementById('back').value.trim();
    const hinos   = document.getElementById('hinos').value.trim();
    const links   = document.getElementById('links').value.trim();
    const recados = document.getElementById('recados').value.trim();

    if (!data)    { showToast('⚠️ Informe a data',             'danger'); document.getElementById('data').focus();    return; }
    if (!horario) { showToast('⚠️ Informe o horário',          'danger'); document.getElementById('horario').focus(); return; }
    if (!vocal)   { showToast('⚠️ Informe o vocal principal',  'danger'); document.getElementById('vocal').focus();   return; }
    if (!back)    { showToast('⚠️ Informe os backing vocals',  'danger'); document.getElementById('back').focus();    return; }

    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const obj = { 
      dataISO: data, 
      horario, 
      vocal, 
      back, 
      hinos, 
      links, 
      recados, 
      updatedAt: serverTimestamp() 
    };

    try {
      if (editDocId) {
        await updateDoc(doc(db, "escalas", editDocId), obj);
        showToast('✓ Escala atualizada', 'success');
      } else {
        obj.createdAt = serverTimestamp();
        await addDoc(col, obj);
        showToast('✓ Escala salva', 'success');
      }
      resetForm();
      switchTab('lista');
    } catch (e) {
      console.error(e);
      showToast('❌ Erro ao salvar. Verifique a conexão.', 'danger');
      btn.disabled = false;
      btn.textContent = editDocId ? 'Atualizar Escala' : 'Salvar na Escala';
    }
  };

  window.salvarApenasRecado = async function(id) {
    const textarea = document.getElementById(`recado-input-${id}`);
    if (!textarea) return;
    const novoRecado = textarea.value.trim();
    
    try {
      await updateDoc(doc(db, "escalas", id), {
        recados: novoRecado,
        updatedAt: serverTimestamp()
      });
      showToast('⚠️ Recado/Ausência atualizado com sucesso!', 'success');
    } catch (e) {
      console.error(e);
      showToast('❌ Erro ao salvar recado.', 'danger');
    }
  };

  window.editarEscala = function(id) {
    const e = escalas.find(x => x.id === id);
    if (!e) return;
    editDocId = id;
    document.getElementById('data').value    = e.dataISO;
    document.getElementById('horario').value = e.horario;
    document.getElementById('vocal').value   = e.vocal;
    document.getElementById('back').value    = e.back;
    document.getElementById('hinos').value   = e.hinos || '';
    document.getElementById('links').value   = e.links || '';
    document.getElementById('recados').value = e.recados || '';
    
    document.getElementById('form-title-text').textContent = 'Editar / Substituir escala';
    document.getElementById('btn-salvar').textContent = 'Atualizar Escala';
    document.getElementById('btn-cancelar').classList.add('visible');
    switchTab('form');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.abrirDialog = function(id) {
    pendingDeleteId = id;
    const e = escalas.find(x => x.id === id);
    if (!e) return;
    const [ano, mes, dia] = e.dataISO.split('-');
    document.getElementById('dialog-desc').textContent =
      `Você vai remover a escala do dia ${dia}/${mes}/${ano} às ${e.horario}. Esta ação não pode ser desfeita.`;
    document.getElementById('overlay').classList.add('active');
  };

  window.fecharDialog = function(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('active');
    pendingDeleteId = null;
  };

  window.confirmarExclusao = async function() {
    if (!pendingDeleteId) return;
    const btn = document.querySelector('.btn-dialog-confirm');
    btn.textContent = 'Removendo...';
    btn.disabled = true;
    try {
      await deleteDoc(doc(db, "escalas", pendingDeleteId));
      if (editDocId === pendingDeleteId) resetForm();
      showToast('🗑 Escala removida', 'danger');
    } catch (e) {
      showToast('❌ Erro ao remover', 'danger');
    }
    btn.textContent = 'Remover';
    btn.disabled = false;
    document.getElementById('overlay').classList.remove('active');
    pendingDeleteId = null;
  };

  function atualizarBadge() {
    const el = document.getElementById('badge-count');
    if(el) {
      if (escalas.length > 0) {
        el.textContent = escalas.length;
        el.style.display = 'inline-flex';
      } else {
        el.style.display = 'none';
      }
    }
  }

  function calcDiasBadge(dataISO) {
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const d = new Date(dataISO + 'T00:00:00');
    const diff = Math.round((d - hoje) / 86400000);
    if (diff === 0)           return { label: 'Hoje',                       cls: 'hoje'   };
    if (diff === 1)           return { label: 'Amanhã',                      cls: 'breve'  };
    if (diff > 1 && diff <= 7) return { label: `Em ${diff} dias`,           cls: 'breve'  };
    if (diff > 7)              return { label: `Em ${diff} dias`,            cls: 'normal' };
    if (diff === -1)          return { label: 'Ontem',                       cls: 'passado'};
    return                            { label: `Há ${Math.abs(diff)} dias`,  cls: 'passado'};
  }

  function formatarLinksHtml(textoLinks) {
    if (!textoLinks) return '<span style="color: #94a3b8; font-style: italic;">Nenhum link anexado</span>';
    const linhas = textoLinks.split('\n');
    return linhas.map(linha => {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      if(linha.match(urlRegex)) {
        return linha.replace(urlRegex, function(url) {
          return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="hino-link-anchor">🎵 Assistir/Ouvir Música</a>`;
        });
      }
      return linha;
    }).join('<br>');
  }

  function renderLista() {
    const container = document.getElementById('lista-escalas');
    if(!container) return;

    if (escalas.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎶</div>
          <h3>Nenhuma escala ainda</h3>
          <p>Toque em "Nova Escala" para<br>começar a organizar a equipe.</p>
        </div>`;
      return;
    }

    const html = escalas.map(e => {
      const [ano, mes, dia] = e.dataISO.split('-');
      const dataBR    = `${dia}/${mes}/${ano}`;
      const mesAbrev  = MESES[parseInt(mes) - 1];
      const diaSemana = SEMANA[new Date(e.dataISO + 'T00:00:00').getDay()];
      const badge     = calcDiasBadge(e.dataISO);
      
      const hinosExibicao = e.hinos ? esc(e.hinos) : '<span style="color: #94a3b8; font-style: italic;">Nenhum hino adicionado</span>';
      const linksHtml = formatarLinksHtml(e.links);
      const valorRecado = e.recados || '';

      return `
        <div class="escala-card">
          <div class="escala-card-header">
            <div class="escala-date-block">
              <div class="escala-date-num">
                <span class="day">${dia}</span>
                <span class="month">${mesAbrev}</span>
              </div>
              <div class="escala-date-info">
                <span class="escala-date-full">${diaSemana}, ${dataBR}</span>
                <span class="escala-time-badge">🕐 ${e.horario}</span>
              </div>
            </div>
            <span class="dias-badge ${badge.cls}">${badge.label}</span>
          </div>
          <div class="escala-card-body">
            <div class="escala-row">
              <span class="escala-row-icon">🎤</span>
              <div class="escala-row-content">
                <div class="escala-row-label">Vocal Principal</div>
                <div class="escala-row-value">${esc(e.vocal)}</div>
              </div>
            </div>
            <div class="escala-row">
              <span class="escala-row-icon">👥</span>
              <div class="escala-row-content">
                <div class="escala-row-label">Backing Vocals</div>
                <div class="escala-row-value">${esc(e.back)}</div>
              </div>
            </div>
            <div class="escala-row">
              <span class="escala-row-icon">🎵</span>
              <div class="escala-row-content">
                <div class="escala-row-label-hinos">Hinos do Dia</div>
                <div class="escala-row-value-hinos" style="white-space: pre-wrap;">${hinosExibicao}</div>
                <div class="hinos-links-container">${linksHtml}</div>
              </div>
            </div>
            
            <div class="escala-recados-box">
              <div class="recados-box-title">📢 Avisos / Justificativas de Ausência</div>
              <textarea id="recado-input-${e.id}" class="recado-card-textarea" placeholder="Ex: Não poderei ir este domingo pois estarei viajando - João">${esc(valorRecado)}</textarea>
              <button class="btn-salvar-recado" onclick="salvarApenasRecado('${e.id}')">💾 Atualizar meu Recado</button>
            </div>

          </div>
          <div class="escala-card-footer">
            <button class="btn-edit-card" onclick="editarEscala('${e.id}')">✏️ Editar Tudo</button>
            <button class="btn-del-card"  onclick="abrirDialog('${e.id}')">🗑 Excluir</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="escala-list">${html}</div>`;
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  iniciarListener();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('App pronto!', reg.scope))
        .catch(err => console.log('Erro SW:', err));
    });
  }
</script>

    --text-hinos:   #b45309;
    --border:       #cbd5e1;
    --danger:       #dc2626; 
    --success:      #16a34a; 
    --warn:         #d97706;
    --radius:       12px;
    --radius-sm:    8px;
    --shadow-sm:    0 2px 8px rgba(15,23,42,0.08);
  }

  }

    background: var(--bg-header);

  }

    font-family: 'Playfair Display', serif;
    font-size: 21px; font-weight: 700; color: #ffffff;
  }
  .header-text p {
    font-size: 11px; color: #93c5fd;

    margin-left: auto; display: flex; align-items: center; gap: 6px;

  .status-dot.online      { background: #4ade80; }
  .status-dot.connecting  { background: #fbbf24; }

  #status-text { font-size: 11px; font-weight: 700; color: #ffffff; }

  .nav-tabs {
    display: flex; background: #ffffff;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 67px; z-index: 99;
  }
  .nav-tab {
    flex: 1; padding: 14px 10px; background: transparent; border: none;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .nav-tab .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; background: var(--primary); color: #ffffff;
    font-size: 11px; font-weight: 700; border-radius: 50%; margin-
