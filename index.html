
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<!-- Configurações cruciais para o App Mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escala Louvor">

<title>Escala do Louvor</title>

<!-- Link para o Manifesto do Aplicativo -->
<link rel="manifest" href="./manifest.json">

<!-- Ícone para iPhones/iPads -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/461/461244.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyABNJEfKqvbTawlgQGPoIXMvYWRmH9kCZY",
    authDomain: "louvor-escala-5d26f.firebaseapp.com",
    projectId: "louvor-escala-5d26f",
    storageBucket: "louvor-escala-5d26f.firebasestorage.app",
    messagingSenderId: "144171388952",
    appId: "1:144171388952:web:54f59fa3dd9a149ab0f36d"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "escalas");

  let escalas         = [];
  let editDocId       = null;
  let pendingDeleteId = null;
  let unsubscribe     = null;

  const MESES  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const SEMANA = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

  function iniciarListener() {
    setStatus('connecting');
    const q = query(col, orderBy("dataISO", "asc"), orderBy("horario", "asc"));
    unsubscribe = onSnapshot(q,
      (snapshot) => {
        escalas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        setStatus('online');
        renderLista();
        atualizarBadge();
      },
      (error) => {
        console.error(error);
        setStatus('error');
      }
    );
  }

  function setStatus(s) {
    const el = document.getElementById('status-dot');
    const tx = document.getElementById('status-text');
    if(el && tx) {
      el.className = 'status-dot ' + s;
      tx.textContent = s === 'online' ? 'Ao vivo' : s === 'connecting' ? 'Conectando...' : 'Sem conexão';
    }
  }

  window.switchTab = function(tab) {
    document.getElementById('panel-form').classList.toggle('active',  tab === 'form');
    document.getElementById('panel-lista').classList.toggle('active', tab === 'lista');
    document.getElementById('tab-form').classList.toggle('active',    tab === 'form');
    document.getElementById('tab-lista').classList.toggle('active',   tab === 'lista');
  };

  let toastTimer;
  window.showToast = function(msg, tipo = '') {
    const el = document.getElementById('toast');
    el.innerHTML = msg;
    el.className = 'toast ' + tipo;
    clearTimeout(toastTimer);
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  };

  window.resetForm = function() {
    editDocId = null;
    ['data','horario','vocal','back','hinos'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('form-title-text').textContent = 'Agendar nova data';
    document.getElementById('btn-salvar').textContent = 'Salvar na Escala';
    document.getElementById('btn-cancelar').classList.remove('visible');
    document.getElementById('btn-salvar').disabled = false;
  };

  window.salvar = async function() {
    const data    = document.getElementById('data').value.trim();
    const horario = document.getElementById('horario').value.trim();
    const vocal   = document.getElementById('vocal').value.trim();
    const back    = document.getElementById('back').value.trim();
    const hinos   = document.getElementById('hinos').value.trim(); // Novo campo

    if (!data)    { showToast('⚠️ Informe a data',             'danger'); document.getElementById('data').focus();    return; }
    if (!horario) { showToast('⚠️ Informe o horário',          'danger'); document.getElementById('horario').focus(); return; }
    if (!vocal)   { showToast('⚠️ Informe o vocal principal',  'danger'); document.getElementById('vocal').focus();   return; }
    if (!back)    { showToast('⚠️ Informe os backing vocals',  'danger'); document.getElementById('back').focus();    return; }

    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    // Incluindo a propriedade hinos no objeto de salvamento
    const obj = { dataISO: data, horario, vocal, back, hinos, updatedAt: serverTimestamp() };

    try {
      if (editDocId) {
        await updateDoc(doc(db, "escalas", editDocId), obj);
        showToast('✓ Escala atualizada', 'success');
      } else {
        obj.createdAt = serverTimestamp();
        await addDoc(col, obj);
        showToast('✓ Escala salva', 'success');
      }
      resetForm();
      switchTab('lista');
    } catch (e) {
      console.error(e);
      showToast('❌ Erro ao salvar. Verifique a conexão.', 'danger');
      btn.disabled = false;
      btn.textContent = editDocId ? 'Atualizar Escala' : 'Salvar na Escala';
    }
  };

  window.editarEscala = function(id) {
    const e = escalas.find(x => x.id === id);
    if (!e) return;
    editDocId = id;
    document.getElementById('data').value    = e.dataISO;
    document.getElementById('horario').value = e.horario;
    document.getElementById('vocal').value   = e.vocal;
    document.getElementById('back').value    = e.back;
    document.getElementById('hinos').value   = e.hinos || ''; // Carrega os hinos se existirem
    document.getElementById('form-title-text').textContent = 'Editar / Substituir escala';
    document.getElementById('btn-salvar').textContent = 'Atualizar Escala';
    document.getElementById('btn-cancelar').classList.add('visible');
    switchTab('form');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.abrirDialog = function(id) {
    pendingDeleteId = id;
    const e = escalas.find(x => x.id === id);
    if (!e) return;
    const [ano, mes, dia] = e.dataISO.split('-');
    document.getElementById('dialog-desc').textContent =
      `Você vai remover a escala do dia ${dia}/${mes}/${ano} às ${e.horario}. Esta ação não pode ser desfeita.`;
    document.getElementById('overlay').classList.add('active');
  };

  window.fecharDialog = function(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('active');
    pendingDeleteId = null;
  };

  window.confirmarExclusao = async function() {
    if (!pendingDeleteId) return;
    const btn = document.querySelector('.btn-dialog-confirm');
    btn.textContent = 'Removendo...';
    btn.disabled = true;
    try {
      await deleteDoc(doc(db, "escalas", pendingDeleteId));
      if (editDocId === pendingDeleteId) resetForm();
      showToast('🗑 Escala removida', 'danger');
    } catch (e) {
      showToast('❌ Erro ao remover', 'danger');
    }
    btn.textContent = 'Remover';
    btn.disabled = false;
    document.getElementById('overlay').classList.remove('active');
    pendingDeleteId = null;
  };

  function atualizarBadge() {
    const el = document.getElementById('badge-count');
    if(el) {
      if (escalas.length > 0) {
        el.textContent = escalas.length;
        el.style.display = 'inline-flex';
      } else {
        el.style.display = 'none';
      }
    }
  }

  function calcDiasBadge(dataISO) {
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const d = new Date(dataISO + 'T00:00:00');
    const diff = Math.round((d - hoje) / 86400000);
    if (diff === 0)           return { label: 'Hoje',                       cls: 'hoje'   };
    if (diff === 1)           return { label: 'Amanhã',                      cls: 'breve'  };
    if (diff > 1 && diff <= 7) return { label: `Em ${diff} dias`,           cls: 'breve'  };
    if (diff > 7)              return { label: `Em ${diff} dias`,            cls: 'normal' };
    if (diff === -1)          return { label: 'Ontem',                       cls: 'passado'};
    return                            { label: `Há ${Math.abs(diff)} dias`,  cls: 'passado'};
  }

  function renderLista() {
    const container = document.getElementById('lista-escalas');
    if(!container) return;

    if (escalas.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎶</div>
          <h3>Nenhuma escala ainda</h3>
          <p>Toque em "Nova Escala" para<br>começar a organizar a equipe.</p>
        </div>`;
      return;
    }

    const html = escalas.map(e => {
      const [ano, mes, dia] = e.dataISO.split('-');
      const dataBR    = `${dia}/${mes}/${ano}`;
      const mesAbrev  = MESES[parseInt(mes) - 1];
      const diaSemana = SEMANA[new Date(e.dataISO + 'T00:00:00').getDay()];
      const badge     = calcDiasBadge(e.dataISO);
      
      // Validação para exibir os hinos ou uma mensagem padrão caso não existam hinos antigos
      const hinosExibicao = e.hinos ? esc(e.hinos) : '<span style="color: var(--text-faint); font-style: italic;">Nenhum hino adicionado</span>';

      return `
        <div class="escala-card">
          <div class="escala-card-header">
            <div class="escala-date-block">
              <div class="escala-date-num">
                <span class="day">${dia}</span>
                <span class="month">${mesAbrev}</span>
              </div>
              <div class="escala-date-info">
                <span class="escala-date-full">${diaSemana}, ${dataBR}</span>
                <span class="escala-time-badge">🕐 ${e.horario}</span>
              </div>
            </div>
            <span class="dias-badge ${badge.cls}">${badge.label}</span>
          </div>
          <div class="escala-card-body">
            <div class="escala-row">
              <span class="escala-row-icon">🎤</span>
              <div class="escala-row-content">
                <div class="escala-row-label">Vocal Principal</div>
                <div class="escala-row-value">${esc(e.vocal)}</div>
              </div>
            </div>
            <div class="escala-row">
              <span class="escala-row-icon">👥</span>
              <div class="escala-row-content">
                <div class="escala-row-label">Backing Vocals</div>
                <div class="escala-row-value">${esc(e.back)}</div>
              </div>
            </div>
            <!-- Novo bloco visual para os Hinos -->
            <div class="escala-row">
              <span class="escala-row-icon">🎵</span>
              <div class="escala-row-content">
                <div class="escala-row-label">Hinos do Dia</div>
                <div class="escala-row-value" style="color: var(--gold); white-space: pre-wrap;">${hinosExibicao}</div>
              </div>
            </div>
          </div>
          <div class="escala-card-footer">
            <button class="btn-edit-card" onclick="editarEscala('${e.id}')">✏️ Editar</button>
            <button class="btn-del-card"  onclick="abrirDialog('${e.id}')">🗑 Excluir</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="escala-list">${html}</div>`;
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  iniciarListener();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('App pronto para instalação (Service Worker Ativo)!', reg.scope))
        .catch(err => console.error('Erro ao preparar instalação do App:', err));
    });
  }
</script>

<style>
  :root {
    --navy:         #080808;
    --navy-mid:     #101010;
    --navy-light:   #1c1c1c;
    --navy-card:    #141414;
    --accent:       #C9A84C;
    --accent-glow:  rgba(201,168,76,0.15);
    --accent-dim:   #7A6020;
    --gold:         #FFD700;
    --gold-dim:     rgba(255,215,0,0.12);
    --text:         #F0E6CC;
    --text-muted:   #9A8860;
    --text-faint:   #4A3F2A;
    --border:       rgba(201,168,76,0.25);
    --border-soft:  rgba(201,168,76,0.08);
    --danger:       #e05252;
    --danger-bg:    rgba(224,82,82,0.1);
    --success:      #34d399;
    --success-bg:   rgba(52,211,153,0.1);
    --warn:         #f59e0b;
    --radius:       12px;
    --radius-sm:    8px;
    --shadow:       0 8px 32px rgba(0,0,0,0.45);
    --shadow-sm:    0 2px 12px rgba(0,0,0,0.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* ── HEADER ─────────────────────────── */
  .app-header {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    padding: 18px 18px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 14px; padding-bottom: 16px; }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 19px; font-weight: 700;
    color: var(--text); line-height: 1.2;
  }
  .header-text p {
    font-size: 11px; color: var(--text-muted);
    font-weight: 300; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 2px;
  }
  .header-status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border-soft);
    padding: 5px 10px; border-radius: 20px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .status-dot.online      { background: var(--success); }
  .status-dot.connecting  { background: var(--warn);    }
  .status-dot.error       { background: var(--danger);  animation: none; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  #status-text { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); }
  .rainbow-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.7;
  }

  /* ── NAV ────────────────────────────── */
  .nav-tabs {
    display: flex;
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border-soft);
    position: sticky; top: 97px; z-index: 99;
  }
  .nav-tab {
    flex: 1; padding: 13px 10px;
    background: transparent; border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700;
    border-radius: 50%; margin-left: 5px; vertical-align: middle;
  }

  /* ── MAIN ───────────────────────────── */
  .main { padding: 20px 16px; }
  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── FORM CARD ──────────────────────── */
  .form-card {
    background: var(--navy-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 20px;
  }
  .form-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 8px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .field-group { margin-bottom: 14px; }
  .field-group:last-of-type { margin-bottom: 0; }
  .field-group label {
    display: block; font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 7px;
  }
  .field-group input, .field-group textarea {
    width: 100%;
    background: var(--navy-light);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .field-group input:focus, .field-group textarea:focus { border-color: var(--accent); background: var(--navy-card); }
  .field-group input::placeholder, .field-group textarea::placeholder { color: var(--text-faint); }
  
  /* Ajustes específicos para a caixa de hinos */
  .field-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.55) sepia(1) saturate(1.5) hue-rotate(180deg); cursor: pointer;
  }

  /* ── BUTTONS ────────────────────────── */
  .btn {
    display: block; width: 100%; padding: 15px; border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    margin-top: 20px;
  }
  .btn-secondary {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border-soft);
    margin-top: 10px; display: none;
  }
  .btn-secondary.visible { display: block; }

  /* ── TOAST ──────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy-card);
    border: 1px solid var(--border);
    color: var(--text); padding: 12px 22px;
    border-radius: 50px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow); z-index: 999;
    opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.danger  { border-color: var(--danger);  color: var(--danger); }

  /* ── EMPTY ──────────────────────────── */
  .empty-state {
    text-align: center; padding: 56px 24px; color: var(--text-muted);
  }
  .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.35; }
  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 600; color: var(--text-faint); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; color: var(--text-faint); line-height: 1.6; }

  /* ── CARDS ──────────────────────────── */
  .escala-list { display: flex; flex-direction: column; gap: 14px; }
  .escala-card {
    background: var(--navy-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow-sm);
    animation: fadeIn 0.3s ease;
    transition: border-color 0.2s;
  }
  .escala-card:hover { border-color: var(--border); }
  .escala-card-header {
    background: var(--navy-light); padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-soft);
  }
  .escala-date-block { display: flex; align-items: center; gap: 10px; }
  .escala-date-num {
    background: var(--accent-glow); border: 1px solid var(--border);
    border-radius: 8px; width: 44px; height: 44px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .escala-date-num .day {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1;
  }
  .escala-date-num .month {
    font-size: 8px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted); margin-top: 1px;
  }
  .escala-date-info { display: flex; flex-direction: column; gap: 3px; }
  .escala-date-full { font-size: 14px; font-weight: 600; color: var(--text); }
  .escala-time-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--gold-dim); border: 1px solid rgba(212,168,67,0.2);
    color: var(--gold); font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
  }
  .dias-badge {
    font-size: 10px; font-weight: 600;
    padding: 4px 8px; border-radius: 20px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .dias-badge.hoje    { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
  .dias-badge.breve   { background: var(--gold-dim);   color: var(--gold);    border: 1px solid rgba(212,168,67,0.2); }
  .dias-badge.normal  { background: var(--accent-glow);color: var(--accent);  border: 1px solid var(--border); }
  .dias-badge.passado { background: transparent;       color: var(--text-faint); border: 1px solid var(--text-faint); }

  .escala-card-body { padding: 14px 16px; }
  .escala-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border-soft);
  }
  .escala-row:last-of-type { border-bottom: none; }
  .escala-row-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; width: 22px; text-align: center; }
  .escala-row-content { flex: 1; min-width: 0; }
  .escala-row-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px;
  }
  .escala-row-value { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; word-break: break-word; }

  .escala-card-footer { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border-soft); }
  .escala-card-footer button {
    padding: 13px 10px; background: transparent; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .escala-card-footer button:active { opacity: 0.7; }
  .btn-edit-card { color: var(--warn); border-right: 1px solid var(--border-soft) !important; }
  .btn-edit-card:hover { background: rgba(245,158,11,0.07); }
  .btn-del-card  { color: var(--danger); }
  .btn-del-card:hover { background: var(--danger-bg); }

  /* ── DIALOG ─────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 200; display: none; align-items: flex-end;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .overlay.active { display: flex; animation: fadeIn 0.2s ease; }
  .dialog {
    background: var(--navy-card);
    border: 1px solid var(--border); border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px; width: 100%;
    animation: slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .dialog h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .dialog p  { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
  .dialog-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dialog-actions button {
    padding: 14px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none;
    -webkit-tap-highlight-color: transparent; transition: opacity 0.15s;
  }
  .dialog-actions button:active { opacity: 0.75; }
  .btn-dialog-cancel  { background: var(--navy-light); color: var(--text-muted); }
  .btn-dialog-confirm { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="header-text">
      <h1>Escala do Louvor</h1>
      <p>Ministério de Música</p>
    </div>
    <div class="header-status">
      <div id="status-dot" class="status-dot connecting"></div>
      <span id="status-text">Conectando...</span>
    </div>
  </div>
  <div class="rainbow-bar"></div>
</header>

<nav class="nav-tabs">
  <button id="tab-lista" class="nav-tab active" onclick="switchTab('lista')">Escalas <span id="badge-count" class="badge" style="display:none;">0</span></button>
  <button id="tab-form" class="nav-tab" onclick="switchTab('form')">Nova Escala</button>
</nav>

<main class="main">
  <!-- ABA LISTA -->
  <div id="panel-lista" class="panel active">
    <div id="lista-escalas"></div>
  </div>

  <!-- ABA FORMULÁRIO -->
  <div id="panel-form" class="panel">
    <div class="form-card">
      <div class="form-card-title">
        <span id="form-title-text">Agendar nova data</span>
      </div>
      
      <div class="field-row">
        <div class="field-group">
          <label for="data">Data</label>
          <input type="date" id="data">
        </div>
        <div class="field-group">
          <label for="horario">Horário</label>
          <input type="time" id="horario">
        </div>
      </div>

      <div class="field-group">
        <label for="vocal">Vocal Principal</label>
        <input type="text" id="vocal" placeholder="Ex: Ana Clara">
      </div>

      <div class="field-group">
        <label for="back">Backing Vocals</label>
        <input type="text" id="back" placeholder="Ex: Lucas, Mariana, Davi">
      </div>

      <!-- NOVO CAMPO: HINOS DO DIA -->
      <div class="field-group">
        <label for="hinos">Hinos do Dia</label>
        <textarea id="hinos" placeholder="1. Grandioso És Tu&#10;2. Porque Ele Vive&#10;3. Em Teus Braços"></textarea>
      </div>

      <button id="btn-salvar" class="btn btn-primary" onclick="salvar()">Salvar na Escala</button>
      <button id="btn-cancelar" class="btn btn-secondary" onclick="resetForm(); switchTab('lista');">Cancelar Edição</button>
    </div>
  </div>
</main>

<!-- MODAL CONFIRMAÇÃO EXCLUSÃO -->
<div id="overlay" class="overlay" onclick="fecharDialog(event)">
  <div class="dialog">
    <h3>Remover Escala?</h3>
    <p id="dialog-desc">Esta ação não pode ser desfeita.</p>
    <div class="dialog-actions">
      <button class="btn-dialog-cancel" onclick="fecharDialog()">Cancelar</button>
      <button class="btn-dialog-confirm" onclick="confirmarExclusao()">Remover</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

</body>
</html>
